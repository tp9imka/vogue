name: vogue_wod
description: "WOD — Functional Fitness. Daily workout viewer for Vogue Fitness UAE branches. Unaffiliated."
publish_to: 'none'
version: 2.0.0+4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  http: ^1.2.2
  html: ^0.15.4
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  intl: ^0.20.0
  go_router: ^16.0.0
  wakelock_plus: ^1.2.8
  share_plus: ^10.1.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^9.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

# Launcher icons are hand-curated under android/app/src/main/res and
# ios/Runner/Assets.xcassets — do NOT regenerate them with
# flutter_launcher_icons (the config below is intentionally removed).

# Native splash — jet background matches the new brand. Re-run after
# changing colors or art with: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0A0908"
  android_12:
    color: "#0A0908"
