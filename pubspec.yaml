name: vogue_wod
description: "Vogue WOD — daily workout viewer for Vogue Fitness UAE branches."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  http: ^1.2.2
  html: ^0.15.4
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  intl: ^0.20.0
  go_router: ^16.0.0
  wakelock_plus: ^1.2.8
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^9.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

# App launcher icons — run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/icon.png"
  adaptive_icon_background: "#0C0E11"
  adaptive_icon_foreground: "assets/brand/icon_foreground.png"
  remove_alpha_ios: true

# Native splash screen — run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0C0E11"
  image: "assets/brand/splash.png"
  android_12:
    color: "#0C0E11"
    image: "assets/brand/splash.png"
